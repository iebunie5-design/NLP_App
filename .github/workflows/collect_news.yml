name: 매일 뉴스 자동 수집

on:
  schedule:
    - cron: '0 23 * * *'  # 매일 한국시간 오전 8시
  workflow_dispatch:       # 수동 실행 버튼

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: |
          pip install feedparser beautifulsoup4 requests pandas

      - name: 뉴스 수집 실행
        run: python collect_news.py

      - name: CSV 자동 커밋 & 푸시
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions Bot"
          git add news_data.csv
          git diff --staged --quiet || git commit -m "뉴스 자동 업데이트 $(date +'%Y-%m-%d %H:%M')"
          git push
