name: 매일 뉴스 수집

on:
  schedule:
    - cron: '0 23 * * *'  # 매일 오전 8시 (한국시간 = UTC+9)
  workflow_dispatch:       # 수동 실행 버튼도 생김

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install feedparser beautifulsoup4 requests pandas

      - name: 뉴스 수집
        run: python collect_news.py

      - name: CSV 커밋 & 푸시
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add news_data.csv
          git diff --staged --quiet || git commit -m "뉴스 자동 업데이트 $(date +'%Y-%m-%d')"
          git push
```

이렇게 하면 흐름이:
```
매일 오전 8시
    ↓ GitHub Actions 자동 실행
    ↓ collect_news.py 실행
    ↓ news_data.csv 업데이트
    ↓ GitHub에 자동 커밋
    ↓ Streamlit Cloud 자동 재배포
